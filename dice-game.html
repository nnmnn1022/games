<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주사위 술게임 리스트 | 무현 & 동향 애프터 파티!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <section id="description-screen" class="screen active">
        <h2 class="neon-text-small">🎲 주사위 술게임 리스트 1</h2>
        <h3>주사위 눈을 굴려서 걸린 게임을 진행합니다.</h3>
        <div class="description-card">
          <div class="game-list-header">
            <span class="col-num">눈</span>
            <span class="col-name">게임 이름</span>
            <span class="col-rule">규칙 설명</span>
          </div>
          <div class="game-item">
            <span class="col-num">1</span>
            <span class="col-name">업앤다운 (Up & Down)</span>
            <span class="col-rule"
              >1~50 정답 맞히기. 정답자 양옆이 마시기.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">2</span>
            <span class="col-name">눈치 게임</span>
            <span class="col-rule"
              >숫자 겹치거나 마지막에 남는 사람이 마시기.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">3</span>
            <span class="col-name">딸기 게임</span>
            <span class="col-rule"
              >8박자 "딸기" 외치기. 박자 놓치면 마시기.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">4</span>
            <span class="col-name">더 게임 오브 데스 (양손)</span>
            <span class="col-rule"
              >지목한 손가락을 따라 이동합니다. 마지막에 화살표가 멈춘 사람이
              마십니다.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">5</span>
            <span class="col-name">훈민정음</span>
            <span class="col-rule"
              >초성 단어 맞히기. 가장 늦게 말한 사람 마시기.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">6</span>
            <span class="col-name">의리주</span>
            <span class="col-rule"
              >큰 잔 나누어 마시기. 마지막 순서가 독박.</span
            >
          </div>
        </div>
        <a href="index.html" class="menu-btn back-btn">돌아가기</a>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
