<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주사위 술게임 리스트 2 | 무현 & 동향 애프터 파티!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <section id="description-screen" class="screen active">
        <h2 class="neon-text-small">🎲 주사위 술게임 리스트 2</h2>
        <div class="description-card">
          <div class="game-list-header">
            <span class="col-num">눈</span>
            <span class="col-name">게임 이름</span>
            <span class="col-rule">규칙 설명</span>
          </div>
          <div class="game-item">
            <span class="col-num">1</span>
            <span class="col-name">지하철 게임</span>
            <span class="col-rule"
              >특정 호선 역 이름 말하기. 틀리면 마시기.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">2</span>
            <span class="col-name">손병호 게임</span>
            <span class="col-rule"
              >다섯 손가락 접기. 먼저 다 접히면 마시기.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">3</span>
            <span class="col-name">공동묘지</span>
            <span class="col-rule"
              >"공동묘지에~ 올라갔더니~" 박자 맞추기. 엇박자 나면 마시기.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">4</span>
            <span class="col-name">베스킨라빈스 31</span>
            <span class="col-rule">숫자 1~3개씩 부르기. 31 부르면 마시기.</span>
          </div>
          <div class="game-item">
            <span class="col-num">5</span>
            <span class="col-name">이미지 게임</span>
            <span class="col-rule"
              >질문 후 동시 지목. 최다 득표자가 마시기.</span
            >
          </div>
          <div class="game-item">
            <span class="col-num">6</span>
            <span class="col-name">주사위 운명</span>
            <span class="col-rule"
              >모두 주사위를 굴려 가장 낮은 주사위 눈이 나온 사람이
              마시기.</span
            >
          </div>
        </div>
        <a href="index.html" class="menu-btn back-btn">돌아가기</a>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
